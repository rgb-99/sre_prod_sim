apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: firewatch
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093
          scheme: http

    rule_files:
      - /etc/prometheus/rules/firewatch-alerts.yaml

    scrape_configs:
      # Job 1: kubernetes-apiservers
      - job_name: kubernetes-apiservers
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      # Job 2: kubernetes-nodes-cadvisor
      # CRITICAL for KinD: Must proxy through API server because direct node IP is unreachable.
      - job_name: kubernetes-nodes-cadvisor
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # Job 3: kubernetes-nodes-kubelet
      - job_name: kubernetes-nodes-kubelet
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # Job 4: kube-state-metrics
      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics.monitoring.svc.cluster.local:8080
        scheme: http

      # Job 5: otel-collector — CRITICAL new job for OTel-native application metrics.
      # Scrapes http_server_request_duration_seconds, process_runtime_*, jvm_*, etc.
      # Without this, the bridge's observation translation layer has nothing to translate.
      - job_name: otel-collector
        static_configs:
          - targets:
              - otel-collector.otel-demo.svc.cluster.local:9464
        scheme: http
        metric_relabel_configs:
          # Copy service_name to 'service' label for alignment with kube-state-metrics naming.
          - source_labels: [service_name]
            target_label: service

      # Job 6: kubernetes-pods (annotation-based scraping)
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Drop pods without prometheus.io/scrape=true annotation.
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Rewrite address to pod_ip:prometheus.io/port.
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Set metrics path from annotation, default /metrics.
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Add namespace label.
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          # Add pod label.
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add service label from OTel Demo's app label.
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: service
          # Drop pods in monitoring namespace to avoid self-scraping.
          - source_labels: [namespace]
            action: drop
            regex: monitoring
