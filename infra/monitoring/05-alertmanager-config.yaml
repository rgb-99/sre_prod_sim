apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: firewatch
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: firewatch-agent
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m

    receivers:
      - name: firewatch-agent
        webhook_configs:
          - url: 'http://AGENT_WEBHOOK_HOST_PLACEHOLDER:9000/webhook'
            send_resolved: false

    inhibit_rules:
      # Suppress warning-severity alerts when critical or page is already firing
      # on the same service. Prevents duplicate webhooks (agent returns 409 Conflict).
      - source_matchers:
          - severity=~"critical|page"
        target_matchers:
          - severity="warning"
        equal: ['service']
